{% load djicons i18n %}
<div data-back-url="{% url 'purchase_orders:purchase_order_lines_list' %}" hidden></div>

<div class="p-4">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold">{% trans "Add Purchaseorderline" %}</h1>
        <div class="flex gap-2">
            <a class="btn btn-ghost btn-sm"
               hx-get="{% url 'purchase_orders:purchase_order_lines_list' %}"
               hx-target="#main-content-area"
               hx-push-url="true">
                {% trans "Cancel" %}
            </a>
            <button type="submit" form="add-purchase_order_line-form" class="btn btn-sm color-primary">
                {% icon "checkmark-outline" %}
                {% trans "Save" %}
            </button>
        </div>
    </div>

        {% if error %}
        <div class="callout callout-error">
            <div class="callout-content"><span class="callout-text">{{ error }}</span></div>
        </div>
        {% endif %}
    <!-- Form -->
    <form id="add-purchase_order_line-form"
          hx-post="{% url 'purchase_orders:purchase_order_line_add' %}" class="max-w-2xl">
        {% csrf_token %}
        <div class="card mb-4">
            <div class="card-body flex flex-col gap-4">
                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Description" %}</label>
                <input type="text" name="description" class="input input-sm w-full" placeholder="{% trans 'Description' %}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Quantity" %}</label>
                <input type="number" name="quantity" class="input input-sm w-full" step="0.01" placeholder="0">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Unit Price" %}</label>
                <input type="number" name="unit_price" class="input input-sm w-full" step="0.01" placeholder="0">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Total" %}</label>
                <input type="number" name="total" class="input input-sm w-full" step="0.01" placeholder="0">
                </div>
            </div>
        </div>
    </form>
</div>
